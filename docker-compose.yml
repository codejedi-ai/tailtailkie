version: '3.8'

services:
  # MongoDB Database (optional - only if not using MongoDB Atlas)
  # If using DATABASE_URL with MongoDB Atlas, comment out or remove this service
  mongodb:
    image: mongo:7.0
    container_name: tensorstore-mongodb
    restart: "no"  # Manual start only
    networks:
      - database-network
    environment:
      MONGO_INITDB_DATABASE: tensorstore
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_ROOT_PASSWORD:-changeme}
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    ports:
      - "127.0.0.1:27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - local-mongodb  # Only start if explicitly requested

  # Flask Backend
  backend:
    build:
      context: ./db-flask-backend
      dockerfile: ../docker/backend.Dockerfile
      args:
        PIP_EXTRA_INDEX_URL: ""
        BUILD_VERSION: ${BUILD_VERSION:-1.0.0}
    container_name: tensorstore-backend
    restart: "no"  # Manual start only
    networks:
      - database-network
      - backend-network
    env_file:
      - docker-secrets.env
    environment:
      # Database Configuration
      # Prefer DATABASE_URL if set (for MongoDB Atlas), otherwise use local MongoDB
      DATABASE_URL: ${DATABASE_URL:-mongodb://${MONGODB_ROOT_USERNAME:-admin}:${MONGODB_ROOT_PASSWORD:-changeme}@mongodb:27017/tensorstore?authSource=admin}
      MONGODB_URI: ${DATABASE_URL:-mongodb://${MONGODB_ROOT_USERNAME:-admin}:${MONGODB_ROOT_PASSWORD:-changeme}@mongodb:27017/tensorstore?authSource=admin}
      
      # Milvus Configuration (from env_file)
      MILVUS_URI: ${MILVUS_URI:-http://milvus:19530}
      MILVUS_TOKEN: ${MILVUS_TOKEN:-}
      MILVUS_USER: ${MILVUS_USER:-}
      
      # Clerk Authentication (from env_file)
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-}
      CLERK_FRONTEND_API: ${CLERK_FRONTEND_API:-https://api.clerk.com}
      
      # Application Configuration
      ENVIRONMENT: ${ENVIRONMENT:-development}
      BUILD_VERSION: ${BUILD_VERSION:-1.0.0}
    # If using MongoDB Atlas (DATABASE_URL), remove depends_on mongodb
    # depends_on:
    #   mongodb:
    #     condition: service_healthy
    ports:
      - "127.0.0.1:5000:5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/service/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Network policy: no internet access, only database access
    # Note: Since we're using cloud databases (MongoDB Atlas, Zilliz Cloud),
    # the backend needs internet access to reach them. The network isolation
    # is relaxed for cloud database connections.
    # For Clerk API: Consider using offline JWT verification or a proxy service

  # Next.js Frontend
  frontend:
    image: tensorstore-frontend:latest
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      args:
        NEXT_PUBLIC_FLASK_API_URL: http://backend:5000/service/api
    container_name: tensorstore-frontend
    restart: "no"  # Manual start only
    networks:
      - backend-network
    env_file:
      - docker-secrets.env
    environment:
      # Backend API URL (internal)
      FLASK_API_URL: http://backend:5000/service/api
      NEXT_PUBLIC_FLASK_API_URL: http://backend:5000/service/api
      
      # Clerk Configuration
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-}
      CLERK_WEBHOOK_SECRET: ${CLERK_WEBHOOK_SECRET:-}
      NEXT_PUBLIC_CLERK_SIGN_IN_URL: ${NEXT_PUBLIC_CLERK_SIGN_IN_URL:-/sign-in}
      NEXT_PUBLIC_CLERK_SIGN_UP_URL: ${NEXT_PUBLIC_CLERK_SIGN_UP_URL:-/sign-up}
      NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL: ${NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL:-/}
      NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL: ${NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL:-/}
      
      # Node Environment
      NODE_ENV: production
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Network policy: only access to backend, no internet
    # Note: Clerk authentication happens client-side, so this is fine

  # Milvus (optional - if running locally)
  milvus:
    image: milvusdb/milvus:v2.3.4
    container_name: tensorstore-milvus
    restart: "no"  # Manual start only
    networks:
      - database-network
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
    depends_on:
      - etcd
      - minio
    ports:
      - "127.0.0.1:19530:19530"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: tensorstore-etcd
    restart: "no"  # Manual start only
    networks:
      - database-network
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: 1000
      ETCD_QUOTA_BACKEND_BYTES: 4294967296
      ETCD_SNAPSHOT_COUNT: 50000
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd

  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: tensorstore-minio
    restart: "no"  # Manual start only
    networks:
      - database-network
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

networks:
  database-network:
    driver: bridge
    internal: true  # No internet access
    ipam:
      config:
        - subnet: 172.20.0.0/16
  backend-network:
    driver: bridge
    internal: true  # No internet access
    ipam:
      config:
        - subnet: 172.21.0.0/16

volumes:
  mongodb_data:
  mongodb_config:
  milvus_data:
  etcd_data:
  minio_data:

