apiVersion: apps/v1
kind: Deployment
metadata:
  name: tensorstore-frontend
  namespace: {{ .Values.namespace }}
  labels:
    app: tensorstore-frontend
spec:
  replicas: {{ .Values.frontend.replicas | default 2 }}
  selector:
    matchLabels:
      app: tensorstore-frontend
  template:
    metadata:
      labels:
        app: tensorstore-frontend
    spec:
      containers:
      - name: frontend
        image: {{ .Values.frontend.image | default "tensorstore-frontend:latest" }}:{{ .Values.frontend.tag | default "latest" }}
        imagePullPolicy: {{ .Values.frontend.imagePullPolicy | default "Always" }}
        ports:
        - containerPort: 3000
          name: http
        envFrom:
        - configMapRef:
            name: tensorstore-frontend-config
        env:
        - name: CLERK_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: tensorstore-secrets
              key: clerk-secret-key
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: tensorstore-frontend
  namespace: {{ .Values.namespace }}
  labels:
    app: tensorstore-frontend
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 3000
    protocol: TCP
    name: http
  selector:
    app: tensorstore-frontend

