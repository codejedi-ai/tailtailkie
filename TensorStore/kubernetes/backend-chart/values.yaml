---
application:
  replicas: 2
  image: tensorstore-backend:latest
  imagePullPolicy: Always
  readinessProbe:
    path: "/service/api/"
    initialDelay: 0
    period: 10
    timeout: 1
  # Don't use liveness probes unless you have a specific situation where
  # you'd find that useful
  # livenessProbe:
  #   path: "/service/api/v1/yourlivenessprobepathhere/"
  #   initialDelay: 305
  #   period: 60
  #   timeout: 5
  ports:
    application:
      name: http
      port: 5000
  resources:
    requests:
      cpu: 250m
      memory: 500Mi
    limits:
      cpu: 750m
      memory: 1000Mi

applicationService:
  type: ClusterIP
  port: 80

# Frontend Configuration
frontend:
  replicas: 2
  image: tensorstore-frontend
  tag: latest
  imagePullPolicy: Always

config:
  environment: DEV
  owner: tensorstore
  platform: live  # possible values: live, demo, dr, bi
  urlPrefix: /service/api

# MongoDB Configuration
mongodb:
  uri: mongodb://mongodb:27017/tensorstore

# Milvus Configuration
milvus:
  uri: http://milvus:19530
  token: ""
  user: ""

# Clerk Authentication
clerk:
  secretKey: ""
  publishableKey: ""
  frontendApi: "https://api.clerk.com"

# MySQL Configuration (legacy, if needed)
mysql:
  host: mysql
  database: tensorstore
  port: "3306"
  username: root

internalNginxIngress:
  class: nginx-internal

# Database connection secret name (for legacy MySQL)
databaseConnectionSecretName: tensorstore-secrets