apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "application.name" . }}-network-policy
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "application.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: {{ include "application.name" . }}
  policyTypes:
  - Ingress
  - Egress
  ingress:
    # Allow ingress from frontend only
    - from:
      - podSelector:
          matchLabels:
            app: tensorstore-frontend
      ports:
      - protocol: TCP
        port: 5000
  egress:
    # Allow egress to MongoDB only
    - to:
      - podSelector:
          matchLabels:
            app: mongodb
      ports:
      - protocol: TCP
        port: 27017
    # Allow egress to Milvus only
    - to:
      - podSelector:
          matchLabels:
            app: milvus
      ports:
      - protocol: TCP
        port: 19530
    # Block all other egress (no internet access)
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: tensorstore-frontend-network-policy
  namespace: {{ .Values.namespace }}
  labels:
    app: tensorstore-frontend
spec:
  podSelector:
    matchLabels:
      app: tensorstore-frontend
  policyTypes:
  - Ingress
  - Egress
  ingress:
    # Allow ingress from ingress controller
    - from:
      - namespaceSelector:
          matchLabels:
            name: ingress-nginx
      ports:
      - protocol: TCP
        port: 3000
  egress:
    # Allow egress to backend only
    - to:
      - podSelector:
          matchLabels:
            app: {{ include "application.name" . }}
      ports:
      - protocol: TCP
        port: 5000
    # Block all other egress (no internet access)

