apiVersion: v1
kind: Secret
metadata:
  name: tensorstore-secrets
  namespace: {{ .Values.namespace }}
type: Opaque
stringData:
  # MongoDB
  mongodb-username: {{ .Values.mongodb.username | default "admin" | b64enc }}
  mongodb-password: {{ .Values.mongodb.password | default "" | b64enc }}
  
  # Milvus
  milvus-token: {{ .Values.milvus.token | default "" | b64enc }}
  
  # Clerk
  clerk-secret-key: {{ .Values.clerk.secretKey | default "" | b64enc }}
  
  # MySQL (legacy)
  mysql-password: {{ .Values.mysql.password | default "" | b64enc }}

