apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "application-config.name" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "application.labels" . | nindent 4 }}
data:
  # Application Configuration
  ENVIRONMENT: {{ .Values.config.environment | quote }}
  BUILD_VERSION: {{ .Chart.AppVersion | quote }}
  URL_PREFIX: {{ .Values.config.urlPrefix | quote }}
  
  # MongoDB Configuration
  MONGODB_URI: {{ .Values.mongodb.uri | quote }}
  DATABASE_URL: {{ .Values.mongodb.uri | quote }}
  
  # Milvus Configuration
  MILVUS_URI: {{ .Values.milvus.uri | quote }}
  MILVUS_TOKEN: {{ .Values.milvus.token | quote }}
  MILVUS_USER: {{ .Values.milvus.user | default "" | quote }}
  
  # Clerk Authentication
  CLERK_SECRET_KEY: {{ .Values.clerk.secretKey | quote }}
  CLERK_FRONTEND_API: {{ .Values.clerk.frontendApi | default "https://api.clerk.com" | quote }}
  
  # MySQL (legacy, if needed)
  DB_HOST: {{ .Values.mysql.host | default "mysql" | quote }}
  DB_DATABASE: {{ .Values.mysql.database | default "tensorstore" | quote }}
  DB_PORT: {{ .Values.mysql.port | default "3306" | quote }}
  DB_USERNAME: {{ .Values.mysql.username | default "root" | quote }}

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: tensorstore-frontend-config
  namespace: {{ .Values.namespace }}
  labels:
    app: tensorstore-frontend
data:
  # Backend API URL (internal)
  FLASK_API_URL: http://{{ include "application.name" . }}:5000/service/api
  NEXT_PUBLIC_FLASK_API_URL: http://{{ include "application.name" . }}:5000/service/api
  
  # Clerk Configuration
  NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: {{ .Values.clerk.publishableKey | quote }}
  
  # Node Environment
  NODE_ENV: production

