[settings]
sections = STDLIB,THIRDPARTY,FIRSTPARTY,LOCALFOLDER
known_first_party = api_service
known_third_party = apispec,dependency-injector,Flask,Flask-HTTPAuth,Flask-RESTful,flasgger,gunicorn,isort,jsonschema,marshmallow,pylint,pytz,requests,six
line_length = 79
indent = '    '

# Black compatability
multi_line_output=3
include_trailing_comma=True
force_grid_wrap=0
use_parentheses=True
